<!--@@ SERVER SIDE (BEFORE PAGE LOADS) FUNCTIONS @@-->
<script runat="server">

    function makeDropdown(data, currentvalue, label) {

        if (!data.hasOwnProperty('attributes')) {
            return '';
        }

        var options = data.attributes.select_options.value;
        var optionKeys = Object.keys(options);
        var optionsList = [];
        var currentLower = String(currentvalue).toLowerCase().trim();
        var matchedKey = '';

        Object.keys(options).forEach(function (key) {
            var keyLower = String(key).toLowerCase();
            var labelLower = String(options[key]).toLowerCase();
            var isSelected = (keyLower === currentLower || labelLower === currentLower);
            if (isSelected && !matchedKey) { matchedKey = key; }
            optionsList.push('<option value="' + key + '"' + (isSelected ? ' selected' : '') + '>' + options[key] + '</option>');
        });

        return '<select class="metadata_options"' +
            ' data-metadataFieldid="' + metadatafield.assetid + '"' +
            ' data-current="' + (matchedKey || currentvalue) + '"' +
            (label ? ' data-label="' + label + '"' : '') + '>' +
            '<option value=""></option>' +
            optionsList.join('') +
            '</select>';
    }

    function makeMultiSelect(data, currentvalues, label) {

        if (!data.hasOwnProperty('attributes')) {
            return '';
        }

        var selectOptions = data.attributes.select_options;
        if (!selectOptions || !selectOptions.value) {
            return '';
        }

        var options = selectOptions.value;
        var rawSelected = Array.isArray(currentvalues)
            ? currentvalues
            : (currentvalues ? String(currentvalues).split(';').map(function (v) { return v.trim(); }) : []);

        // Lowercase the incoming values for case-insensitive matching
        var rawSelectedLower = rawSelected.map(function (v) { return String(v).toLowerCase(); });

        var matchedKeys = [];
        var optionsList = [];

        Object.keys(options).forEach(function (key) {
            var keyLower = String(key).toLowerCase();
            var labelLower = String(options[key]).toLowerCase();
            // Match against key OR label, both case-insensitively
            var isSelected = (rawSelectedLower.indexOf(keyLower) !== -1 || rawSelectedLower.indexOf(labelLower) !== -1);
            if (isSelected) { matchedKeys.push(key); }
            var label = String(options[key]).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            var safeKey = String(key).replace(/"/g, '&quot;');
            optionsList.push('<option value="' + safeKey + '"' + (isSelected ? ' selected' : '') + '>' + label + '</option>');
        });

        return '<select multiple class="metadata_options"' +
            ' data-metadataFieldid="' + metadatafield.assetid + '"' +
            ' data-current="' + JSON.stringify(matchedKeys).replace(/"/g, '&quot;') + '"' +
            (label ? ' data-label="' + label + '"' : '') + '>' +
            optionsList.join('') +
            '</select>';
    }

    // Helper for rendering the Status dropdown.
    //
    // The Squiz Matrix asset status is a reserved property (not a custom attribute).
    // It stores a numeric code; editors only need four of the possible values.
    // This helper always returns a `<select>` containing those four options.
    // The current value can be supplied either as the numeric code (e.g. "16")
    // or the human label ("Live"); the function will convert to the matching
    // code for `data-current`.
    //
    // This is called from `row-template.html` instead of outputting
    // `%asset_status_description%`. The client-side JavaScript (see `editor.js`)
    // looks for `data-attributename="status"` to know that the field should be
    // saved via `js_api.setAssetStatus()` (which works for all asset types).
    function makeStatusDropdown(currentStatusValue, label) {
        // Map status values: numeric code -> display label
        var statusOptions = {
            '1': 'Archive',
            '2': 'Under Construction',
            '16': 'Live',
            '64': 'Safe Editing'
        };

        // Try to find matching status code from current value
        // Current value might be: numeric code (e.g., "16") or label text (e.g., "Live")
        // Also handle "Archived" (with 'd') matching "Archive" (without 'd')
        var currentStatusCode = '';
        var currentLower = String(currentStatusValue).toLowerCase().trim();
        
        Object.keys(statusOptions).forEach(function (code) {
            var codeLower = String(code).toLowerCase();
            var labelLower = String(statusOptions[code]).toLowerCase();
            if (codeLower === currentLower || 
                labelLower === currentLower || 
                (labelLower + 'd') === currentLower) {
                currentStatusCode = code;
            }
        });

        var optionsList = [];
        Object.keys(statusOptions).forEach(function (code) {
            var isSelected = (code === currentStatusCode);
            optionsList.push('<option value="' + code + '"' + (isSelected ? ' selected' : '') + '>' + statusOptions[code] + '</option>');
        });

        return '<select class="metadata_options"' +
            ' data-attributename="status"' +
            ' data-current="' + currentStatusCode + '"' +
            (label ? ' data-label="' + label + '"' : '') + '>' +
            optionsList.join('') +
            '</select>';
    }

</script>
